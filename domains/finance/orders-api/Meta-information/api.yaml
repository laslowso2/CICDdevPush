type: api
version: v4.5.0
data:
  name: CustomerOrderAPI
  version: "1.0"
  context: /customer-order/1.0
  type: HTTP
  lifeCycleStatus: PUBLISHED
  visibility: PUBLIC
  subscriptionAvailability: ALL_TENANTS
  endpointConfig:
    endpoint_type: http
    production_endpoints:
      url: http://localhost:8080/api/orders
    sandbox_endpoints:
      url: http://localhost:8081/api/orders
  securityScheme:
    - oauth2
    - api_key
  policies:
    - Bronze
    - Silver
    - Gold
  operations:
    - target: /orders
      verb: GET
      throttlingPolicy: 10PerMin
      authType: Application & Application User
    - target: /orders
      verb: POST
      throttlingPolicy: 5PerMin
      authType: Application & Application User
    - target: /orders/{orderId}
      verb: GET
      throttlingPolicy: 10PerMin
      authType: Application & Application User
  tags:
    - finance
    - orders
    - demo
