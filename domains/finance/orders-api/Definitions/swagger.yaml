openapi: 3.0.0
info:
  title: Customer Order API
  version: "1.0"
paths:
  /orders:
    get:
      summary: List orders
      operationId: listOrders
      responses:
        "200":
          description: OK
    post:
      summary: Create order
      operationId: createOrder
      responses:
        "201":
          description: Created
  /orders/{orderId}:
    get:
      summary: Get order
      operationId: getOrder
      parameters:
        - name: orderId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK

