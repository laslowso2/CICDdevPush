info:
  title: Customer Order API
  version: "1.0"
openapi: 3.0.0
paths:
  /orders:
    get:
      operationId: listOrders
      responses:
        "200":
          description: OK
      summary: List orders
    post:
      operationId: createOrder
      responses:
        "201":
          description: Created
      summary: Create order
  /orders/{orderId}:
    get:
      operationId: getOrder
      parameters:
      - in: path
        name: orderId
        required: true
        schema:
          type: string
      responses:
        "200":
          description: OK
      summary: Get order
